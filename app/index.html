<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptHub v2</title>
  <link rel="stylesheet" href="app.css?v=ab3f0a8" />
</head>
<body>
  <div id="layout">

    <!-- 左サイドバー: カテゴリ一覧 -->
    <aside id="sidebar">
      <div id="logo">PromptHub</div>
      <nav id="cat-nav"><!-- JS で生成 --></nav>
    </aside>

    <!-- メインエリア -->
    <main id="main">

      <!-- フィルタバー -->
      <div id="filterbar">
        <input id="search" type="search" placeholder="全カテゴリを検索 (en / jp)..." autocomplete="off" />
        <div id="target-filters">
          <button class="tf-btn active" data-target="">すべて</button>
          <button class="tf-btn" data-target="self">self</button>
          <button class="tf-btn" data-target="other">other</button>
          <button class="tf-btn" data-target="mutual">mutual</button>
          <button class="tf-btn" data-target="object">object</button>
          <button class="tf-btn" data-target="__null__">未設定</button>
        </div>
      </div>

      <!-- Prompt Builder バー -->
      <div id="builder-bar">
        <span id="builder-label">Prompt Builder</span>
        <div id="builder-chips"><!-- JS で生成 --></div>
        <div id="builder-actions">
          <button id="builder-save" disabled>保存</button>
          <button id="builder-copy" disabled>COPY</button>
          <button id="builder-clear">CLEAR</button>
        </div>
      </div>

      <!-- 保存済みプロンプトパネル -->
      <div id="saved-bar">
        <div id="saved-bar-header">
          <span id="saved-bar-label">保存済みプロンプト</span>
          <span id="saved-bar-count"></span>
          <div id="saved-bar-actions">
            <button id="saved-export" title="JSONでエクスポート">エクスポート</button>
            <label id="saved-import-label" title="JSONからインポート">インポート
              <input id="saved-import-input" type="file" accept=".json" />
            </label>
            <button id="saved-toggle" title="開閉">▼</button>
          </div>
        </div>
        <div id="saved-list"><!-- JS で生成 --></div>
      </div>

      <!-- レコード一覧 -->
      <div id="record-list"><!-- JS で生成 --></div>
      <div id="empty-msg" hidden>該当するタグがありません。</div>
    </main>

    <!-- 右サイドバー: インデックスパネル -->
    <aside id="index-panel">
      <div id="index-header">インデックス</div>
      <nav id="index-tree"><!-- JS で生成 --></nav>
    </aside>

  </div>

  <div id="toast"></div>

  <!-- コンテキストメニュー -->
  <div id="ctx-menu">
    <button id="ctx-delete">このタグを削除</button>
    <div class="ctx-sep"></div>
    <button id="ctx-copy">コピー</button>
    <button id="ctx-add">Builder に追加</button>
  </div>

  <!-- 保存ダイアログ -->
  <div id="save-dialog">
    <div id="save-dialog-box">
      <div id="save-dialog-title">プロンプトを保存</div>
      <input id="save-name-input" type="text" placeholder="名前を入力（最大40文字）" maxlength="40" autocomplete="off" />
      <div id="save-dialog-btns">
        <button id="save-confirm">保存</button>
        <button id="save-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=ab3f0a8"></script>
</body>
</html>
