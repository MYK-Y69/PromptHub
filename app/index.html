<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptHub v2</title>
  <link rel="stylesheet" href="app.css?v=62dc72e" />
</head>
<body>
  <div id="layout">

    <!-- 左サイドバー: カテゴリ一覧 -->
    <aside id="sidebar">
      <div id="logo">PromptHub</div>
      <nav id="cat-nav"><!-- JS で生成 --></nav>
    </aside>

    <!-- メインエリア -->
    <main id="main">

      <!-- フィルタバー -->
      <div id="filterbar">
        <input id="search" type="search" placeholder="全カテゴリを検索 (en / jp)..." autocomplete="off" />
        <div id="target-filters">
          <button class="tf-btn active" data-target="">すべて</button>
          <button class="tf-btn" data-target="self">self</button>
          <button class="tf-btn" data-target="other">other</button>
          <button class="tf-btn" data-target="mutual">mutual</button>
          <button class="tf-btn" data-target="object">object</button>
          <button class="tf-btn" data-target="__null__">未設定</button>
        </div>
      </div>

      <!-- Prompt Builder バー（旧ジャンプバー位置） -->
      <div id="builder-bar">
        <span id="builder-label">Prompt Builder</span>
        <div id="builder-chips"><!-- JS で生成 --></div>
        <div id="builder-actions">
          <button id="builder-copy" disabled>COPY</button>
          <button id="builder-clear">CLEAR</button>
        </div>
      </div>

      <!-- レコード一覧 -->
      <div id="record-list"><!-- JS で生成 --></div>
      <div id="empty-msg" hidden>該当するタグがありません。</div>
    </main>

    <!-- 右サイドバー: インデックスパネル -->
    <aside id="index-panel">
      <div id="index-header">インデックス</div>
      <nav id="index-tree"><!-- JS で生成 --></nav>
    </aside>

  </div>

  <div id="toast"></div>

  <script src="./app.js?v=62dc72e"></script>
</body>
</html>
