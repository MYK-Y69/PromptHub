name: Bump asset version on push

on:
  push:
    branches: [main]
    paths-ignore:
      - "app/index.html"   # avoid re-trigger on version-bump commit
      - "app/app.js"

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # fetch full history so we can commit back
          fetch-depth: 0

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Bump ?v= query strings
        run: python3 tools/bump_version.py "${{ steps.sha.outputs.short }}"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/index.html app/app.js
          if git diff --cached --quiet; then
            echo "No version changes, skipping commit."
          else
            git commit -m "chore: bump asset version to ${{ steps.sha.outputs.short }} [skip ci]"
            git push origin main
          fi
